<!DOCTYPE html>
<html data-theme="light"><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--color-surface-card); }
  .display { font-weight: 900; font-size: 84px; line-height: .92; letter-spacing: -0.02em; color: var(--color-fg-default); }
  .display .dot { color: var(--color-brand-primary); }
  .meta { margin-top: 14px; font-family: var(--primitive-font-mono); font-size: 11px; color: var(--color-fg-muted); }
</style></head><body>
  <div class="display">ULZIIBAT<span class="dot">.TECH</span></div>
  <div class="meta">TT Hoves · 900 Black · 84 / 78 · tracking −0.02em · .TECH always in brand-lime</div>
</body></html>
