<!DOCTYPE html>
<html data-theme="light"><head><meta charset="utf-8"><title>Brand palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--color-surface-card); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border-radius: 12px; overflow: hidden; border: 1px solid var(--color-stroke-default); }
  .chip { height: 84px; }
  .meta { padding: 10px 12px; display: flex; justify-content: space-between; align-items: baseline; gap: 8px; background: var(--color-surface-card); }
  .name { font-weight: 800; font-size: 13px; color: var(--color-fg-default); }
  .hex  { font-family: var(--primitive-font-mono); font-size: 11px; color: var(--color-fg-muted); }
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#82BD39"></div><div class="meta"><span class="name">brand / primary</span><span class="hex">#82BD39</span></div></div>
  <div class="sw"><div class="chip" style="background: var(--primitive-lime-600)"></div><div class="meta"><span class="name">brand / hover</span><span class="hex">lime-600</span></div></div>
  <div class="sw"><div class="chip" style="background:#E3F2CE"></div><div class="meta"><span class="name">brand / subtle</span><span class="hex">#E3F2CE</span></div></div>
  <div class="sw"><div class="chip" style="background: var(--primitive-lime-900)"></div><div class="meta"><span class="name">brand / fg</span><span class="hex">lime-900</span></div></div>
  <div class="sw"><div class="chip" style="background:#0C0D0B"></div><div class="meta"><span class="name">ink</span><span class="hex">#0C0D0B</span></div></div>
  <div class="sw"><div class="chip" style="background: var(--primitive-slate-50); border-right: 1px solid var(--color-stroke-default)"></div><div class="meta"><span class="name">surface / base</span><span class="hex">slate-50</span></div></div>
</div>
</body></html>
