<!DOCTYPE html>
<html data-theme="light"><head><meta charset="utf-8"><title>Eyebrows &amp; meta</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 22px; background: var(--color-surface-card); }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .ex { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-family: var(--primitive-font-mono); font-size: 10px; color: var(--color-fg-muted); }
  .lime { color: var(--color-brand-primary); }
</style></head><body>
  <div class="stack">
    <div class="ex">
      <span class="lbl">.t-eyebrow · footer legal</span>
      <span class="t-eyebrow">ULZIIBAT.<span class="lime">TECH</span> © 2025</span>
    </div>
    <div class="ex">
      <span class="lbl">.t-meta · sidebar label</span>
      <span class="t-meta">Агуулга</span>
    </div>
    <div class="ex">
      <span class="lbl">.t-quote · pull quote in prose</span>
      <span class="t-quote">"Token систем ашиглахад нэг файлд өнгө өөрчлөхөд сайт даяар автоматаар шинэчлэгдэнэ."</span>
    </div>
  </div>
</body></html>
