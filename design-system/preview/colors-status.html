<!DOCTYPE html>
<html data-theme="light"><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 20px; background: var(--color-surface-card); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .pill { border-radius: 12px; border: 1px solid var(--color-stroke-default); padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .bar { height: 6px; border-radius: 999px; }
  .row { display: flex; justify-content: space-between; align-items:center; }
  .name { font-weight: 800; font-size: 13px; color: var(--color-fg-default); }
  .val  { font-family: var(--primitive-font-mono); font-size: 10px; color: var(--color-fg-muted); }
  .chip { display:inline-flex; align-items:center; gap: 6px; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
</style></head><body>
<div class="grid">
  <div class="pill"><div class="bar" style="background: var(--color-status-success)"></div><div class="row"><span class="name">success</span><span class="val">oklch(60% .17 145)</span></div><span class="chip" style="background: color-mix(in oklab, var(--color-status-success) 12%, transparent); color: var(--color-status-success)">✓ Saved</span></div>
  <div class="pill"><div class="bar" style="background: var(--color-status-error)"></div><div class="row"><span class="name">error</span><span class="val">oklch(58% .22 29)</span></div><span class="chip" style="background: color-mix(in oklab, var(--color-status-error) 12%, transparent); color: var(--color-status-error)">! Алдаа</span></div>
  <div class="pill"><div class="bar" style="background: var(--color-status-warning)"></div><div class="row"><span class="name">warning</span><span class="val">oklch(72% .17 75)</span></div><span class="chip" style="background: color-mix(in oklab, var(--color-status-warning) 18%, transparent); color: var(--color-status-warning)">⚠ Анхаар</span></div>
  <div class="pill"><div class="bar" style="background: var(--color-status-info)"></div><div class="row"><span class="name">info</span><span class="val">oklch(62% .17 230)</span></div><span class="chip" style="background: color-mix(in oklab, var(--color-status-info) 14%, transparent); color: var(--color-status-info)">i Мэдээ</span></div>
</div>
</body></html>
