<!DOCTYPE html>
<html data-theme="light"><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 22px; background: var(--color-surface-card); display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { display:flex; flex-direction:column; gap: 6px; }
  label { font-weight: 700; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--color-fg-subtle); }
  .inp { font-family: var(--primitive-font-sans); font-size: 15px; padding: 11px 14px; background: var(--color-surface-base); border: 1px solid var(--color-stroke-default); border-radius: 8px; color: var(--color-fg-default); outline: none; transition: border-color var(--dur-base) var(--ease-primary), box-shadow var(--dur-base) var(--ease-primary); }
  .inp:focus { border-color: var(--color-stroke-focus); box-shadow: 0 0 0 3px color-mix(in oklab, var(--color-brand-primary) 30%, transparent); }
  .inp.error { border-color: var(--color-status-error); }
  .hint { font-size: 11px; color: var(--color-fg-muted); }
  .err  { font-size: 11px; color: var(--color-status-error); }
</style></head><body>
  <div class="field">
    <label>И-мэйл</label>
    <input class="inp" value="ulziibat.n@gmail.com">
    <span class="hint">Хариу 24 цагийн дотор</span>
  </div>
  <div class="field">
    <label>Зурвас</label>
    <input class="inp error" value="">
    <span class="err">Талбарыг бөглөнө үү</span>
  </div>
</body></html>
