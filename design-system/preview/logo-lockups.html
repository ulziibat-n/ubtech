<!DOCTYPE html>
<html data-theme="light"><head><meta charset="utf-8"><title>Logo lockups</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 16px; background: var(--color-surface-base); display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; font-family: var(--primitive-font-sans); }
  .box { border-radius: 14px; padding: 22px; display:flex; align-items:center; justify-content:center; aspect-ratio: 2 / 1; position: relative; }
  .box img { max-width: 100%; max-height: 60px; display: block; }
  .box .lbl {
    position: absolute; bottom: 8px; left: 12px;
    font-family: var(--primitive-font-mono); font-size: 9px;
    letter-spacing: .08em; text-transform: uppercase;
  }
  .tint { background: var(--color-brand-subtle); }
  .tint .lbl { color: var(--primitive-lime-900); opacity: .6; }
  .ink  { background: #0C0D0B; }
  .ink .lbl { color: #fff; opacity: .5; }
  .card { background: var(--color-surface-card); border: 1px solid var(--color-stroke-default); }
  .card .lbl { color: var(--color-fg-muted); }
</style></head><body>
  <!-- Color=Black (ink+lime disc) on white card -->
  <div class="box card">
    <img src="../assets/logo-color-black.svg" alt="">
    <span class="lbl">on light · Color=Black</span>
  </div>
  <!-- Color=Dark (solid ink monochrome) on tint -->
  <div class="box tint">
    <img src="../assets/logo-color-dark.svg" alt="">
    <span class="lbl">on tint · Color=Dark</span>
  </div>
  <!-- Color=White (white+lime) on ink -->
  <div class="box ink">
    <img src="../assets/logo-color-white.svg" alt="">
    <span class="lbl">on ink · Color=White</span>
  </div>
</body></html>
