<!DOCTYPE html>
<html data-theme="light"><head><meta charset="utf-8"><title>Weights</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 20px; background: var(--color-surface-card); font-family: var(--primitive-font-sans); color: var(--color-fg-default); }
  .r { display: grid; grid-template-columns: 110px 1fr; align-items: baseline; padding: 6px 0; border-bottom: 1px dashed var(--color-stroke-default); }
  .r:last-child { border: 0; }
  .l { font-family: var(--primitive-font-mono); font-size: 10px; color: var(--color-fg-muted); }
  .t { font-size: 22px; line-height: 1.05; }
</style></head><body>
  <div class="r"><span class="l">Hairline / 100</span><span class="t" style="font-family: var(--primitive-font-hairline); font-weight: 100;">Aa Бб Тт 123</span></div>
  <div class="r"><span class="l">Thin / 100</span><span class="t" style="font-weight: 100;">Aa Бб Тт 123</span></div>
  <div class="r"><span class="l">Light / 300</span><span class="t" style="font-weight: 300;">Aa Бб Тт 123</span></div>
  <div class="r"><span class="l">Regular / 400</span><span class="t" style="font-weight: 400;">Aa Бб Тт 123</span></div>
  <div class="r"><span class="l">Medium / 500</span><span class="t" style="font-weight: 500;">Aa Бб Тт 123</span></div>
  <div class="r"><span class="l">DemiBold / 600</span><span class="t" style="font-weight: 600;">Aa Бб Тт 123</span></div>
  <div class="r"><span class="l">Bold / 700</span><span class="t" style="font-weight: 700;">Aa Бб Тт 123</span></div>
  <div class="r"><span class="l">ExtraBold / 800</span><span class="t" style="font-weight: 800;">Aa Бб Тт 123</span></div>
  <div class="r"><span class="l">Black / 900</span><span class="t" style="font-weight: 900;">Aa Бб Тт 123</span></div>
</body></html>
