<!DOCTYPE html>
<html data-theme="dark"><head><meta charset="utf-8"><title>Dark theme</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { margin:0; padding: 20px; background: var(--color-surface-base); color: var(--color-fg-default); font-family: var(--primitive-font-sans); }
  .card { background: var(--color-surface-card); border: 1px solid var(--color-stroke-default); border-radius: 16px; padding: 18px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 18px; align-items: center; }
  h3 { margin: 0 0 4px; font-weight: 900; font-size: 20px; letter-spacing: -.01em; }
  p  { margin: 0; color: var(--color-fg-subtle); font-size: 13px; }
  .swatches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .s { border-radius: 8px; aspect-ratio: 1 / 1; }
  .btn { margin-top: 12px; display:inline-flex; align-items:center; gap:6px; background: var(--color-brand-primary); color: var(--color-brand-fg); font-weight: 700; font-size: 13px; padding: 8px 14px; border-radius: 999px; }
</style></head><body>
<div class="card">
  <div>
    <h3>Dark mode</h3>
    <p>Cool near-black surfaces, brand-lime stays identical. Toggle via <code style="font-family: var(--primitive-font-mono); font-size: 11px; background: var(--color-surface-raised); padding: 1px 5px; border-radius: 4px;">[data-theme="dark"]</code>.</p>
    <span class="btn">Harahguit tovch ·→</span>
  </div>
  <div class="swatches">
    <div class="s" style="background: var(--color-surface-base)"></div>
    <div class="s" style="background: var(--color-surface-card)"></div>
    <div class="s" style="background: var(--color-surface-raised)"></div>
    <div class="s" style="background: var(--color-brand-primary)"></div>
    <div class="s" style="background: var(--color-fg-default)"></div>
    <div class="s" style="background: var(--color-stroke-default)"></div>
  </div>
</div>
</body></html>
