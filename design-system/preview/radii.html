<!DOCTYPE html>
<html data-theme="light"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 20px; background: var(--color-surface-card); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .b { aspect-ratio: 1 / 1; background: var(--color-brand-subtle); border: 1px solid var(--color-stroke-default); display: flex; align-items: flex-end; padding: 8px; font-family: var(--primitive-font-mono); font-size: 10px; color: var(--color-fg-subtle); }
</style></head><body>
<div class="row">
  <div class="b" style="border-radius: 2px">xs · 2</div>
  <div class="b" style="border-radius: 4px">sm · 4</div>
  <div class="b" style="border-radius: 8px">md · 8</div>
  <div class="b" style="border-radius: 16px">lg · 16</div>
  <div class="b" style="border-radius: 24px">xl · 24</div>
  <div class="b" style="border-radius: 9999px">full</div>
</div>
</body></html>
