<!DOCTYPE html>
<html data-theme="light"><head><meta charset="utf-8"><title>Neutral scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background: var(--color-surface-card); }
  .scale { display:flex; border-radius: 12px; overflow: hidden; border: 1px solid var(--color-stroke-default); }
  .s { flex: 1; height: 84px; display:flex; align-items:flex-end; padding: 8px; font-family: var(--primitive-font-mono); font-size: 10px; color: rgba(0,0,0,.55); }
  .s.dk { color: rgba(255,255,255,.7); }
  .tokens { display:grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 14px; }
  .tok { padding: 8px 10px; border: 1px solid var(--color-stroke-default); border-radius: 8px; display:flex; justify-content: space-between; align-items:center; font-size: 12px; }
  .tok b { font-weight: 800; color: var(--color-fg-default); }
  .dot { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--color-stroke-default); }
</style></head><body>
<div class="scale">
  <div class="s" style="background: var(--primitive-slate-50)">50</div>
  <div class="s" style="background: var(--primitive-slate-100)">100</div>
  <div class="s" style="background: var(--primitive-slate-200)">200</div>
  <div class="s" style="background: var(--primitive-slate-400)">400</div>
  <div class="s dk" style="background: var(--primitive-slate-600)">600</div>
  <div class="s dk" style="background: var(--primitive-slate-700)">700</div>
  <div class="s dk" style="background: var(--primitive-slate-800)">800</div>
  <div class="s dk" style="background: var(--primitive-slate-900)">900</div>
</div>
<div class="tokens">
  <div class="tok"><b>fg-default</b><div class="dot" style="background: var(--color-fg-default)"></div></div>
  <div class="tok"><b>fg-subtle</b><div class="dot" style="background: var(--color-fg-subtle)"></div></div>
  <div class="tok"><b>fg-muted</b><div class="dot" style="background: var(--color-fg-muted)"></div></div>
  <div class="tok"><b>stroke-default</b><div class="dot" style="background: var(--color-stroke-default)"></div></div>
  <div class="tok"><b>stroke-strong</b><div class="dot" style="background: var(--color-stroke-strong)"></div></div>
  <div class="tok"><b>surface-raised</b><div class="dot" style="background: var(--color-surface-raised)"></div></div>
</div>
</body></html>
