<!DOCTYPE html>
<html data-theme="light"><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 20px; background: var(--color-surface-card); }
  .row { display: grid; grid-template-columns: 74px 1fr; gap: 14px; padding: 8px 0; border-bottom: 1px dashed var(--color-stroke-default); align-items: baseline; }
  .row:last-child { border: 0; }
  .lbl { font-family: var(--primitive-font-mono); font-size: 10px; color: var(--color-fg-muted); white-space: nowrap; }
</style></head><body>
  <div class="row"><span class="lbl">h1 / 900</span><span class="t-h1">Шинэ технологи</span></div>
  <div class="row"><span class="lbl">h2 / 800</span><span class="t-h2">Tools &amp; workflow</span></div>
  <div class="row"><span class="lbl">h3 / 700</span><span class="t-h3">Брэнд өнгөний систем</span></div>
  <div class="row"><span class="lbl">lead / 400</span><span class="t-lead">A unified design language bridging web and social.</span></div>
  <div class="row"><span class="lbl">body / 400</span><span class="t-body">Хуучин аргаар өнгийг HTML-д шууд бичдэг байсан — одоо token-оор удирдана.</span></div>
</body></html>
