<!DOCTYPE html>
<html data-theme="light"><head><meta charset="utf-8"><title>Nav header</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 18px 22px; background: var(--color-surface-card); }
  .bar { display:flex; align-items:center; gap: 28px; }
  .brand { display:flex; align-items:center; gap: 8px; text-decoration: none; color: var(--color-fg-default); }
  .mono { width: 28px; height: 28px; border-radius: 999px; background: #0C0D0B; display:flex; align-items:center; justify-content:center; }
  .mono svg { width: 18px; }
  .wm { font-weight: 900; font-size: 12px; letter-spacing: .04em; line-height: 1; text-transform: uppercase; }
  .wm .a { display:block; }
  .wm .b { display:block; color: var(--color-brand-primary); }
  nav { display:flex; gap: 4px; }
  nav a { font-size: 13px; font-weight: 500; color: var(--color-fg-subtle); text-decoration: none; padding: 6px 10px; border-radius: 8px; }
  nav a.on { color: var(--color-fg-default); background: var(--color-surface-raised); }
  .cta { margin-left:auto; display:inline-flex; align-items:center; gap:6px; background: var(--color-surface-inverse); color: var(--color-fg-inverse); font-size: 13px; font-weight: 500; padding: 8px 10px 8px 14px; border-radius: 9999px; text-decoration:none; }
  .cta svg { width: 18px; height: 18px; fill: currentColor; }
</style></head><body>
  <div class="bar">
    <a class="brand" href="#">
      <span class="mono"><svg viewBox="0 0 256 256"><path d="M117.088 169.29L138.912 139.502L160.442 169.29L204.092 109.714L179.023 91.1336L160.442 116.498L138.618 86.4147L117.088 116.498L95.2627 86.7097L51.9078 146.286L76.977 164.866L95.2627 139.502L117.088 169.29Z" fill="#82BD39"/></svg></span>
      <span class="wm"><span class="a">ulziibat</span><span class="b">tech</span></span>
    </a>
    <nav>
      <a href="#" class="on">Нүүр</a>
      <a href="#">Нийтлэл</a>
      <a href="#">Төслүүд</a>
      <a href="#">Тухай</a>
    </nav>
    <a class="cta" href="#">Надтай холбогдох <svg viewBox="0 -960 960 960"><path d="m560-240-56-58 142-142H160v-80h486L504-662l56-58 240 240-240 240Z"/></svg></a>
  </div>
</body></html>
