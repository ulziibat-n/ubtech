<!DOCTYPE html>
<html data-theme="light"><head><meta charset="utf-8"><title>Logo monogram</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 24px; background: var(--color-surface-card); display:flex; align-items:center; justify-content:space-between; gap: 18px; }
  .mono { width: 120px; height: 120px; border-radius: 999px; background: #0C0D0B; display:flex; align-items:center; justify-content:center; }
  .mono svg { width: 74px; height: auto; }
  .meta { flex: 1; }
  .meta h3 { margin: 0 0 6px; font-weight: 900; font-size: 22px; letter-spacing: -.01em; }
  .meta p  { margin: 0; font-size: 13px; color: var(--color-fg-subtle); line-height: 1.5; }
  code { font-family: var(--primitive-font-mono); font-size: 11px; background: var(--color-surface-raised); padding: 1px 5px; border-radius: 4px; }
</style></head><body>
  <div class="mono">
    <!-- simplified zig-zag mark, brand-lime on ink -->
    <svg viewBox="0 0 256 256"><path d="M117.088 169.29L138.912 139.502L160.442 169.29L204.092 109.714L179.023 91.1336L160.442 116.498L138.618 86.4147L117.088 116.498L95.2627 86.7097L51.9078 146.286L76.977 164.866L95.2627 139.502L117.088 169.29Z" fill="#82BD39"/></svg>

  <div class="meta">
    <h3>Logo monogram</h3>
    <p>Circular black disc with lime zig-zag. Ships in 5 colorways — see <code>assets/logo-color-*.svg</code>. Always round; never place inside another rounded shape.</p>
  </div>
</body></html>
