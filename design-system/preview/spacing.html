<!DOCTYPE html>
<html data-theme="light"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 20px; background: var(--color-surface-card); }
  .row { display:flex; align-items: center; gap: 14px; padding: 6px 0; border-bottom: 1px dashed var(--color-stroke-default); }
  .row:last-child { border: 0; }
  .lbl { font-family: var(--primitive-font-mono); font-size: 11px; color: var(--color-fg-muted); width: 90px; }
  .bar { height: 14px; background: var(--color-brand-primary); border-radius: 4px; }
</style></head><body>
  <div class="row"><span class="lbl">space-1 · 4</span><div class="bar" style="width: 4px"></div></div>
  <div class="row"><span class="lbl">space-2 · 8</span><div class="bar" style="width: 8px"></div></div>
  <div class="row"><span class="lbl">space-4 · 16</span><div class="bar" style="width: 16px"></div></div>
  <div class="row"><span class="lbl">space-6 · 24</span><div class="bar" style="width: 24px"></div></div>
  <div class="row"><span class="lbl">space-8 · 32</span><div class="bar" style="width: 32px"></div></div>
  <div class="row"><span class="lbl">space-12 · 48</span><div class="bar" style="width: 48px"></div></div>
  <div class="row"><span class="lbl">space-16 · 64</span><div class="bar" style="width: 64px"></div></div>
  <div class="row"><span class="lbl">space-24 · 96</span><div class="bar" style="width: 96px"></div></div>
</body></html>
