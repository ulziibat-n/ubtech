<!DOCTYPE html>
<html lang="mn" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rits · Social poster system</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="posters.css">
<style>
  html, body { margin: 0; background: #F1EFE9; height: 100vh; overflow: hidden; font-family: var(--primitive-font-sans); }
  /* Help overlay */
  .help {
    position: fixed; top: 16px; left: 16px; z-index: 20;
    background: #0C0D0B; color: #FAFAF8;
    border-radius: 12px; padding: 14px 16px; max-width: 320px;
    font-size: 12px; line-height: 1.5; letter-spacing: 0.01em;
  }
  .help h3 { margin: 0 0 6px; font-size: 13px; font-weight: 800; letter-spacing: -0.01em; }
  .help p  { margin: 4px 0 0; opacity: 0.75; }
  .help kbd {
    font-family: var(--primitive-font-mono); font-size: 10px;
    background: rgba(255,255,255,0.1); padding: 1px 5px; border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .help .close {
    position: absolute; top: 6px; right: 8px;
    background: none; border: none; color: #FAFAF8; opacity: 0.5;
    font-size: 18px; line-height: 1; cursor: pointer; padding: 4px;
  }
  .help.hidden { display: none; }
  /* Make canvas background cream */
  .dc-host { background: #F1EFE9 !important; }
</style>
</head>
<body>

<div class="help" id="help">
  <button class="close" onclick="document.getElementById('help').classList.add('hidden')">×</button>
  <h3>Rits social poster system</h3>
  <p>9 формат × 4 visual direction. Постер бүр ДОТОР <b>Copy SVG</b> товч байгаа — дар, Figma дотор paste хий.</p>
  <p style="margin-top:10px"><kbd>Space</kbd> чирж нүүлгэнэ · <kbd>⌘/Ctrl + scroll</kbd> zoom · <kbd>F</kbd> тухайн артборд дээр фокус.</p>
</div>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="poster-core.jsx"></script>
<script type="text/babel" src="poster-layouts.jsx"></script>

<script type="text/babel">
// Real social media dimensions → rendered at 1:1 inside the canvas.
// Canvas auto-scales via pan/zoom so huge posters are navigable.
const FMT = {
  ig_square:   { w: 1080, h: 1080, name: 'Instagram post' },
  ig_portrait: { w: 1080, h: 1350, name: 'Instagram portrait / Threads' },
  ig_story:    { w: 1080, h: 1920, name: 'Instagram Story / Reels' },
  fb_square:   { w: 1200, h: 1200, name: 'Facebook post' },
  fb_cover:    { w: 1640, h:  859, name: 'Facebook cover' },
  li_post:     { w: 1200, h:  628, name: 'LinkedIn post' },
  yt_thumb:    { w: 1280, h:  720, name: 'YouTube thumbnail' },
  x_post:      { w: 1600, h:  900, name: 'Twitter / X post' },
};

// ── Demo content (Монгол, реалистик) ──────────────────────
const BLOG = {
  eyebrow: 'ШИНЭ НИЙТЛЭЛ',
  title: 'React Server Components-ийг бодитоор хэрхэн ашиглах вэ?',
  cta: 'UNSH',
  readTime: '8 МИН · 2026',
};

const QUOTE = {
  quote: 'Код бичих нь асуудал шийдэх тухай биш, сэтгэж байгаагаа бусдад тайлбарлах тухай.',
  attribution: 'Ulziibat',
};

const HOTTAKE = {
  label: 'HOT TAKE',
  statement: 'JavaScript framework-ийн жинхэнэ өрсөлдөгч нь HTML өөрөө.',
};
const HOTTAKE_DK = {
  label: 'HOT TAKE',
  statement: 'TypeScript бол *баримжаа*, бурхан биш.',
};

const STAT = {
  label: 'READERS / 2025',
  number: '147K',
  unit: '+',
  caption: 'Блогын жилийн уншигчдын тоо. Та бүхэнд баярлалаа.',
};

const ANNOUNCE = {
  kicker: 'ХААЛТТАЙ WORKSHOP',
  headline: 'Next.js 15-тай ажиллаж сурах 3 цагийн сургалт',
  date: '2026.05.12 / 19:00',
  place: 'ONLINE / ZOOM',
  cta: 'БҮРТГҮҮЛЭХ',
};

const BEFORE_AFTER = {
  beforeLabel: 'UseEffect муугаар',
  afterLabel:  'Useeffect зөв',
  beforeText: 'Бүх юмаа useEffect-д хийх',
  afterText:  'Зөвхөн жинхэнэ side-effect хийх',
};

const TIP_COVER = {
  kicker: 'WORKFLOW · 2026',
  count: '5',
  title: 'React-д гаргадаг түгээмэл алдаа',
};
const TIPS = [
  { head: 'State-ийг дээд талд нь өргөх',       body: 'Хоёр компонент адилхан state хэрэглэж байгаа бол — parent-д зөөгөөд, props-оор дамжуулаарай. Дублицаци нь bug-ийн эх сурвалж.' },
  { head: 'useEffect-ээ жагсаалтаар тэтгэх',   body: 'Effect бүрт ганц зорилго. Event handler-т ажилбал effect-д биш, handler-т нь бич. Effect бол sync, fetch биш.' },
  { head: 'Keys-ээ санамсаргүй өгөхгүй',       body: 'index биш, item.id. Жагсаалт дараалал солигдоход React таних зүйлээ алдана, DOM-оо дахин зурна, алдаа гарна.' },
  { head: 'useMemo-г хоёр удаа боддог',         body: 'Хэмжилтгүй optimization бол гоёл. 80%-ын тохиолдолд хоосон зардал нэмж, код уншихад хэцүү болгоно.' },
  { head: 'Context бүрийн хэрэглээг бод',       body: 'Global state гэж бодохгүй. Context тутмын consumer бүр update бүрт re-render хийнэ — том apps-д slow болно.' },
];
const TIP_FINAL = { cta: 'ЦААШ УНШИХ', url: 'ulziibat.tech/blog' };

const app = (
  <DesignCanvas>

    {/* ── Instagram — square post ─────────────────────────── */}
    <DCSection id="ig_square" title="Instagram post · 1080 × 1080" subtitle="Square — main feed">
      <DCArtboard id="a" label="A · Editorial" width={FMT.ig_square.w} height={FMT.ig_square.h}>
        <BlogPromoEditorial width={FMT.ig_square.w} height={FMT.ig_square.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="b" label="B · Bold lime" width={FMT.ig_square.w} height={FMT.ig_square.h}>
        <HotTakeBold width={FMT.ig_square.w} height={FMT.ig_square.h} {...HOTTAKE} />
      </DCArtboard>
      <DCArtboard id="c" label="C · Dark" width={FMT.ig_square.w} height={FMT.ig_square.h}>
        <QuoteDark width={FMT.ig_square.w} height={FMT.ig_square.h} {...QUOTE} />
      </DCArtboard>
      <DCArtboard id="d" label="D · Photo" width={FMT.ig_square.w} height={FMT.ig_square.h}>
        <BlogPromoPhoto width={FMT.ig_square.w} height={FMT.ig_square.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="e" label="E · Stat" width={FMT.ig_square.w} height={FMT.ig_square.h}>
        <StatEditorial width={FMT.ig_square.w} height={FMT.ig_square.h} {...STAT} />
      </DCArtboard>
      <DCArtboard id="f" label="F · Before/After" width={FMT.ig_square.w} height={FMT.ig_square.h}>
        <BeforeAfter width={FMT.ig_square.w} height={FMT.ig_square.h} {...BEFORE_AFTER} />
      </DCArtboard>
    </DCSection>

    {/* ── Instagram carousel / Threads — portrait ──────────── */}
    <DCSection id="carousel" title="Instagram carousel / Threads · 1080 × 1350"
      subtitle="Portrait — 5-slide tip-list carousel (cover → items → CTA)">
      <DCArtboard id="cov" label="01 · Cover" width={FMT.ig_portrait.w} height={FMT.ig_portrait.h}>
        <TipCoverEditorial width={FMT.ig_portrait.w} height={FMT.ig_portrait.h} {...TIP_COVER} />
      </DCArtboard>
      {TIPS.map((t, i) => (
        <DCArtboard key={i} id={`t${i+1}`} label={`0${i+2} · ${t.head.slice(0,22)}…`}
          width={FMT.ig_portrait.w} height={FMT.ig_portrait.h}>
          { i % 2 === 0
            ? <TipItemEditorial width={FMT.ig_portrait.w} height={FMT.ig_portrait.h} num={String(i+1).padStart(2,'0')} total="05" head={t.head} body={t.body} />
            : <TipItemDark      width={FMT.ig_portrait.w} height={FMT.ig_portrait.h} num={String(i+1).padStart(2,'0')} total="05" head={t.head} body={t.body} />
          }
        </DCArtboard>
      ))}
      <DCArtboard id="end" label="07 · CTA" width={FMT.ig_portrait.w} height={FMT.ig_portrait.h}>
        <TipFinalEditorial width={FMT.ig_portrait.w} height={FMT.ig_portrait.h} {...TIP_FINAL} />
      </DCArtboard>
    </DCSection>

    {/* ── Single-post portraits (Threads / IG portrait) ────── */}
    <DCSection id="portrait" title="Threads / IG portrait · 1080 × 1350" subtitle="Single-shot posts in portrait">
      <DCArtboard id="a" label="A · Editorial quote" width={FMT.ig_portrait.w} height={FMT.ig_portrait.h}>
        <QuoteEditorial width={FMT.ig_portrait.w} height={FMT.ig_portrait.h} {...QUOTE} />
      </DCArtboard>
      <DCArtboard id="b" label="B · Bold hot take" width={FMT.ig_portrait.w} height={FMT.ig_portrait.h}>
        <HotTakeBold width={FMT.ig_portrait.w} height={FMT.ig_portrait.h} {...HOTTAKE} />
      </DCArtboard>
      <DCArtboard id="c" label="C · Dark hot take" width={FMT.ig_portrait.w} height={FMT.ig_portrait.h}>
        <HotTakeDark width={FMT.ig_portrait.w} height={FMT.ig_portrait.h} {...HOTTAKE_DK} />
      </DCArtboard>
      <DCArtboard id="d" label="D · Announce" width={FMT.ig_portrait.w} height={FMT.ig_portrait.h}>
        <AnnounceEditorial width={FMT.ig_portrait.w} height={FMT.ig_portrait.h} {...ANNOUNCE} />
      </DCArtboard>
    </DCSection>

    {/* ── Instagram story / Reels cover ────────────────────── */}
    <DCSection id="story" title="Instagram Story / Reels cover · 1080 × 1920" subtitle="Vertical — 9:16">
      <DCArtboard id="a" label="A · Editorial" width={FMT.ig_story.w} height={FMT.ig_story.h}>
        <BlogPromoEditorial width={FMT.ig_story.w} height={FMT.ig_story.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="b" label="B · Lime" width={FMT.ig_story.w} height={FMT.ig_story.h}>
        <BlogPromoLime width={FMT.ig_story.w} height={FMT.ig_story.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="c" label="C · Dark" width={FMT.ig_story.w} height={FMT.ig_story.h}>
        <BlogPromoDark width={FMT.ig_story.w} height={FMT.ig_story.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="d" label="D · Photo" width={FMT.ig_story.w} height={FMT.ig_story.h}>
        <BlogPromoPhoto width={FMT.ig_story.w} height={FMT.ig_story.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="e" label="E · Announce dark" width={FMT.ig_story.w} height={FMT.ig_story.h}>
        <AnnounceDark width={FMT.ig_story.w} height={FMT.ig_story.h} {...ANNOUNCE} />
      </DCArtboard>
    </DCSection>

    {/* ── Facebook post ───────────────────────────────────── */}
    <DCSection id="fb_square" title="Facebook post · 1200 × 1200" subtitle="Square">
      <DCArtboard id="a" label="A · Editorial" width={FMT.fb_square.w} height={FMT.fb_square.h}>
        <BlogPromoEditorial width={FMT.fb_square.w} height={FMT.fb_square.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="b" label="B · Lime" width={FMT.fb_square.w} height={FMT.fb_square.h}>
        <QuoteLime width={FMT.fb_square.w} height={FMT.fb_square.h} {...QUOTE} />
      </DCArtboard>
      <DCArtboard id="c" label="C · Dark" width={FMT.fb_square.w} height={FMT.fb_square.h}>
        <BlogPromoDark width={FMT.fb_square.w} height={FMT.fb_square.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="d" label="D · Stat (lime)" width={FMT.fb_square.w} height={FMT.fb_square.h}>
        <StatLime width={FMT.fb_square.w} height={FMT.fb_square.h} {...STAT} />
      </DCArtboard>
    </DCSection>

    {/* ── Facebook cover ──────────────────────────────────── */}
    <DCSection id="fb_cover" title="Facebook cover · 1640 × 859" subtitle="Profile / page banner">
      <DCArtboard id="a" label="A · Editorial" width={FMT.fb_cover.w} height={FMT.fb_cover.h}>
        <BlogPromoEditorial width={FMT.fb_cover.w} height={FMT.fb_cover.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="b" label="B · Dark" width={FMT.fb_cover.w} height={FMT.fb_cover.h}>
        <BlogPromoDark width={FMT.fb_cover.w} height={FMT.fb_cover.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="c" label="C · Photo" width={FMT.fb_cover.w} height={FMT.fb_cover.h}>
        <BlogPromoPhoto width={FMT.fb_cover.w} height={FMT.fb_cover.h} {...BLOG} />
      </DCArtboard>
    </DCSection>

    {/* ── LinkedIn post ───────────────────────────────────── */}
    <DCSection id="li_post" title="LinkedIn post · 1200 × 628" subtitle="Landscape link card">
      <DCArtboard id="a" label="A · Editorial" width={FMT.li_post.w} height={FMT.li_post.h}>
        <BlogPromoEditorial width={FMT.li_post.w} height={FMT.li_post.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="b" label="B · Lime" width={FMT.li_post.w} height={FMT.li_post.h}>
        <BlogPromoLime width={FMT.li_post.w} height={FMT.li_post.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="c" label="C · Stat editorial" width={FMT.li_post.w} height={FMT.li_post.h}>
        <StatEditorial width={FMT.li_post.w} height={FMT.li_post.h} {...STAT} />
      </DCArtboard>
      <DCArtboard id="d" label="D · Announce" width={FMT.li_post.w} height={FMT.li_post.h}>
        <AnnounceEditorial width={FMT.li_post.w} height={FMT.li_post.h} {...ANNOUNCE} />
      </DCArtboard>
    </DCSection>

    {/* ── YouTube thumbnail ───────────────────────────────── */}
    <DCSection id="yt_thumb" title="YouTube thumbnail · 1280 × 720" subtitle="16:9 — read at tiny scale">
      <DCArtboard id="a" label="A · Bold lime" width={FMT.yt_thumb.w} height={FMT.yt_thumb.h}>
        <HotTakeBold width={FMT.yt_thumb.w} height={FMT.yt_thumb.h} {...HOTTAKE} />
      </DCArtboard>
      <DCArtboard id="b" label="B · Dark" width={FMT.yt_thumb.w} height={FMT.yt_thumb.h}>
        <HotTakeDark width={FMT.yt_thumb.w} height={FMT.yt_thumb.h} {...HOTTAKE_DK} />
      </DCArtboard>
      <DCArtboard id="c" label="C · Photo" width={FMT.yt_thumb.w} height={FMT.yt_thumb.h}>
        <BlogPromoPhoto width={FMT.yt_thumb.w} height={FMT.yt_thumb.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="d" label="D · Lime promo" width={FMT.yt_thumb.w} height={FMT.yt_thumb.h}>
        <BlogPromoLime width={FMT.yt_thumb.w} height={FMT.yt_thumb.h} {...BLOG} />
      </DCArtboard>
    </DCSection>

    {/* ── Twitter / X post ────────────────────────────────── */}
    <DCSection id="x_post" title="Twitter / X post · 1600 × 900" subtitle="16:9 landscape card">
      <DCArtboard id="a" label="A · Editorial" width={FMT.x_post.w} height={FMT.x_post.h}>
        <QuoteEditorial width={FMT.x_post.w} height={FMT.x_post.h} {...QUOTE} />
      </DCArtboard>
      <DCArtboard id="b" label="B · Hot take" width={FMT.x_post.w} height={FMT.x_post.h}>
        <HotTakeBold width={FMT.x_post.w} height={FMT.x_post.h} {...HOTTAKE} />
      </DCArtboard>
      <DCArtboard id="c" label="C · Dark" width={FMT.x_post.w} height={FMT.x_post.h}>
        <BlogPromoDark width={FMT.x_post.w} height={FMT.x_post.h} {...BLOG} />
      </DCArtboard>
      <DCArtboard id="d" label="D · Stat lime" width={FMT.x_post.w} height={FMT.x_post.h}>
        <StatLime width={FMT.x_post.w} height={FMT.x_post.h} {...STAT} />
      </DCArtboard>
    </DCSection>

  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(app);
</script>

</body>
</html>
