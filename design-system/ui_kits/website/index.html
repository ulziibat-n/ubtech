<!DOCTYPE html>
<html lang="mn" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ULZIIBAT.TECH — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin: 0; background: var(--color-surface-base); color: var(--color-fg-default); }
  body { font-family: var(--primitive-font-sans); }
  * { box-sizing: border-box; }
  a { color: var(--color-fg-link); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Shared.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Post.jsx"></script>
<script type="text/babel" src="About.jsx"></script>

<script type="text/babel">
  const { useState, useEffect } = React;

  const ThemeToggle = ({ theme, setTheme }) => (
    <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')}
      style={{
        position: 'fixed', bottom: 20, right: 20, zIndex: 100,
        background: 'var(--color-surface-inverse)', color: 'var(--color-fg-inverse)',
        border: 0, padding: '10px 14px', borderRadius: 9999,
        fontSize: 12, fontWeight: 700, letterSpacing: '.1em',
        textTransform: 'uppercase', cursor: 'pointer',
        boxShadow: 'var(--shadow-md)', fontFamily: 'var(--primitive-font-sans)',
      }}>
      {theme === 'light' ? '🌙 Dark' : '☀ Light'}
    </button>
  );

  const App = () => {
    const [route, setRoute] = useState(() => {
      try { return JSON.parse(localStorage.getItem('ubtech-route') || '{"page":"home"}'); }
      catch { return { page: 'home' }; }
    });
    const [theme, setTheme] = useState(() => localStorage.getItem('ubtech-theme') || 'light');

    useEffect(() => { localStorage.setItem('ubtech-route', JSON.stringify(route)); }, [route]);
    useEffect(() => {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('ubtech-theme', theme);
    }, [theme]);

    const goto = (page) => setRoute({ page });
    const openPost = (post) => setRoute({ page: 'post', post });

    return (
      <>
        <Header active={route.page === 'post' ? 'blog' : route.page} onNav={goto} />
        {route.page === 'home'  && <Home onOpenPost={openPost} />}
        {route.page === 'blog'  && <Home onOpenPost={openPost} />}
        {route.page === 'work'  && <Home onOpenPost={openPost} />}
        {route.page === 'about' && <About />}
        {route.page === 'post'  && <Post post={route.post} onBack={() => goto('blog')} />}
        <Footer />
        <ThemeToggle theme={theme} setTheme={setTheme} />
      </>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
